aid: carters
name: Carter's
description: >-
  Carter's, Inc. is the largest branded marketer of young children's apparel
  in the United States, operating the Carter's, OshKosh B'gosh, and Skip Hop
  brands. Its customer-facing digital surface includes carters.com and
  carters.com/cart e-commerce, mobile apps, a rewards program, and vendor /
  supply-chain integrations, but no public developer API or partner program
  is currently published.
